services:
  - type: web
    name: ai-study-assistant
    runtime: node
    rootDir: ./
    buildCommand: npm install && npm run install-all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
